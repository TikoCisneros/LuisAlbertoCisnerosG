<div class="product-form-container">
  <h2 class="product-form-container__title">
    {{ isEditMode() ? 'Edición de Producto' : 'Formulario de Registro' }}
  </h2>

  <hr class="product-form-container__divider" />

  <form class="product-form" [formGroup]="productForm">
    <div class="product-form__grid">
      <!-- Campo: ID -->
      <c-input-form
        [id]="'id'"
        [type]="'text'"
        [label]="'ID'"
        [placeholder]="'Ej. trj-1234'"
        formControlName="id"
        [maxLength]="10"
        [isInvalid]="isControlInvalid('id')"
        [errorMessage]="getErrorMessage('id')"
      />
      <!-- Campo: Nombre -->
      <c-input-form
        [id]="'name'"
        [type]="'text'"
        [label]="'Nombre'"
        [placeholder]="'Nombre del producto'"
        formControlName="name"
        [maxLength]="100"
        [isInvalid]="isControlInvalid('name')"
        [errorMessage]="getErrorMessage('name')"
      />
      <!-- Campo: Descripción -->
      <c-input-form
        [id]="'description'"
        [type]="'text'"
        [label]="'Descripción'"
        [placeholder]="'Descripción detallada'"
        formControlName="description"
        [maxLength]="200"
        [isInvalid]="isControlInvalid('description')"
        [errorMessage]="getErrorMessage('description')"
      />
      <!-- Campo: Logo -->
      <c-input-form
        [id]="'logoURL'"
        [type]="'text'"
        [label]="'Logo'"
        [placeholder]="'http://imagen.com/logo.png'"
        formControlName="logoURL"
        [isInvalid]="isControlInvalid('logoURL')"
        [errorMessage]="getErrorMessage('logoURL')"
      />
      <!-- Campo: Fecha Liberación -->
      <c-input-form
        [id]="'releaseDate'"
        [type]="'date'"
        [label]="'Fecha de Liberación'"
        formControlName="releaseDate"
        [minDate]="minDate"
        [isInvalid]="isControlInvalid('revisionDate')"
        [errorMessage]="getErrorMessage('revisionDate')"
      />
      <!-- Campo: Fecha Revisión -->
      <c-input-form
        [id]="'revisionDate'"
        [type]="'date'"
        [label]="'Fecha de Reestructuración'"
        formControlName="revisionDate"
      />
    </div>
    <!-- Acciones -->
    <div class="product-form__actions">
      <c-button variant="secondary" (onClick)="resetForm()" [isDisabled]="isLoading()"
        >Reiniciar</c-button
      >
      <c-button
        variant="primary"
        type="submit"
        [isDisabled]="productForm.invalid || isLoading()"
        [isLoading]="isLoading()"
        (onClick)="onSubmitHandler()"
        >Enviar</c-button
      >
    </div>
  </form>
</div>
